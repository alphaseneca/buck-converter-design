name: Manufacturing Release

on:
  push:
    tags:
      - 'v*'   # Triggers on tags like v0.1.0, v0.2.0, etc.

permissions:
  contents: write   # Required to create GitHub Releases and upload assets

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run KiForge
        uses: alphaseneca/kiforge@v0.1.0
        with:
          project_path: '.'
          output_dir: 'kiforge'
          export_3d: 'true'
          export_svg: 'true'
          export_bom: 'true'
          export_sch_pdf: 'true'
          export_pos: 'true'
          export_step: 'true'
          export_gerbers: 'true'
          export_drills: 'true'
          export_ibom: 'true'

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: kiforge/*   # Upload every generated file directly as a release asset
